name: Publish package

on:
  push:

  workflow_dispatch:
    inputs:
      new-version:
        description: New version to be published, overrides tag
        required: true
        type: string

      npm-tag:
        description: NPM tag
        required: true
        default: latest
        type: choice
        options:
          - latest
          - next

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            arch: linux-x64-glibc
          - os: macos-13
            arch: darwin-x64
          - os: macos-14
            arch: darwin-arm64
          - os: windows-2019
            arch: win32-x64

    name: Build for ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Prebuild
        run: npm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prebuild-${{ matrix.arch }}
          path: prebuilds/**/*.node

  build-linux-arm64:
    strategy:
      matrix:
        include:
          - os: bullsye
            libc: glibc
          - os: alpine
            libc: musl

    name: Build for linux-arm64-${{ matrix.libc }}
    runs-on: buildjet-2vcpu-ubuntu-2204-arm

    container:
      image: node:20-${{ matrix.os }}

    steps:
      - name: Install build deps
        if: matrix.libc == 'glibc'
        run: apt update -yq && apt install -yq g++ git make python3

      - name: Install build deps
        if: matrix.libc == 'musl'
        run: apk add --no-cache g++ git make python3

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies
        run: npm ci

      - name: Prebuild
        run: npm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prebuild-linux-arm64-${{ matrix.libc }}
          path: prebuilds/**/*.node

  build-linux-x64-musl:
    name: Build for linux-x64-musl
    runs-on: ubuntu-latest

    container:
      image: node:20-alpine

    steps:
      - name: Install build deps
        run: apk add --no-cache g++ git make python3

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies
        run: npm ci

      - name: Prebuild
        run: npm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prebuild-linux-x64-musl
          path: prebuilds/**/*.node

  build-freebsd-x64:
    name: Build for freebsd-x64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Prebuild
        uses: vmactions/freebsd-vm@v1
        with:
          prepare: |
            pkg install -y gmake python3 npm-node20
          run: |
            npm ci
            npm run build
          sync: sshfs

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prebuild-freebsd-x64
          path: prebuilds/**/*.node

  publish:
    name: Upload package artifact
    runs-on: ubuntu-latest

    needs:
      - build
      - build-freebsd-x64
      - build-linux-arm64
      - build-linux-x64-musl

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup npm with Node.js 20
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 20
          token: ${{ secrets.NPM_TOKEN }}
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Download artifacts
        id: download-artifact
        uses: actions/download-artifact@v4

      - name: Move prebuild artifacts
        run: mkdir prebuilds && cp --recursive prebuild-*/* prebuilds/

      - name: Pack package
        run: npm pack

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          path: '*.tgz'
